<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baraka Ride</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #4CAF50, #2e7d32);
}

.container {
  max-width: 420px;
  margin: 50px auto;
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  color: white;
  background: linear-gradient(90deg, #4CAF50, #2e7d32);
  padding: 15px;
  border-radius: 10px;
}

.input-group {
  margin-top: 15px;
}

label {
  font-size: 14px;
  font-weight: bold;
  color: #555;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

input:focus, select:focus {
  border-color: #4CAF50;
  outline: none;
  box-shadow: 0 0 5px rgba(76,175,80,0.3);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #4CAF50, #2e7d32);
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.03);
}

#fare {
  margin-top: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* AUTOCOMPLETE */
.autocomplete {
  position: relative;
}

.autocomplete-items {
  position: absolute;
  top: 105%;
  left: 0;
  right: 0;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  max-height: 180px;
  overflow-y: auto;
  z-index: 999;
}

.autocomplete-items div {
  padding: 10px;
  cursor: pointer;
}

.autocomplete-items div:hover {
  background: #f1f1f1;
}

.autocomplete-active {
  background-color: #4CAF50;
  color: #fff;
}
</style>
</head>

<body>

<div class="container">
<h2>🚗 Baraka Ride</h2>

<div class="input-group autocomplete">
<label>Pickup District</label>
<input id="pickup" type="text" placeholder="Type pickup district">
</div>

<div class="input-group autocomplete">
<label>Destination District</label>
<input id="destination" type="text" placeholder="Type destination district">
</div>

<div class="input-group">
<label>Vehicle Type</label>
<select id="vehicle">
  <option value="PrivateCar">🚗 Private Car</option>
  <option value="Noah">🚐 NOAH</option>
  <option value="HiAce">🚐 HiAce</option>
</select>
</div>

<button onclick="calculateFare()">Calculate Fare</button>

<p id="fare"></p>
</div>

<script>

// districts A-Z
const locations = [
"Dhaka","Faridpur","Gazipur","Gopalganj","Jamalpur","Kishoreganj","Madaripur","Manikganj","Munshiganj",
"Mymensingh","Narayanganj","Narsingdi","Netrokona","Rajbari","Shariatpur","Sherpur","Tangail",
"Bogra","Joypurhat","Naogaon","Natore","Nawabganj","Pabna","Rajshahi","Sirajganj",
"Dinajpur","Gaibandha","Kurigram","Lalmonirhat","Nilphamari","Panchagarh","Rangpur","Thakurgaon",
"Barguna","Barisal","Bhola","Jhalokati","Patuakhali","Pirojpur",
"Bandarban","Brahmanbaria","Chandpur","Chattogram","Comilla","Cox's Bazar","Feni","Khagrachari","Lakshmipur","Noakhali","Rangamati",
"Habiganj","Maulvibazar","Sunamganj","Sylhet",
"Bagerhat","Chuadanga","Jessore","Jhenaidah","Khulna","Kushtia","Magura","Meherpur","Narail","Satkhira"
].sort();

// 🔥 PRO AUTOCOMPLETE
function autocomplete(input) {

  let list = document.createElement("div");
  list.setAttribute("class", "autocomplete-items");
  input.parentNode.appendChild(list);

  let currentFocus = -1;

  input.addEventListener("focus", () => show(""));
  input.addEventListener("input", () => show(input.value));

  input.addEventListener("keydown", function(e) {
    let items = list.getElementsByTagName("div");

    if (e.key === "ArrowDown") {
      currentFocus++;
      addActive(items);
    } 
    else if (e.key === "ArrowUp") {
      currentFocus--;
      addActive(items);
    } 
    else if (e.key === "Enter") {
      e.preventDefault();
      if (currentFocus > -1 && items[currentFocus]) {
        items[currentFocus].click();
      }
    }
  });

  function show(val) {
    list.innerHTML = "";
    currentFocus = -1;

    locations.forEach(loc => {
      if (loc.toLowerCase().includes(val.toLowerCase())) {
        let item = document.createElement("div");
        item.textContent = loc;

        item.onclick = () => {
          input.value = loc;
          list.innerHTML = "";
        };

        list.appendChild(item);
      }
    });
  }

  function addActive(items) {
    if (!items) return;

    removeActive(items);

    if (currentFocus >= items.length) currentFocus = 0;
    if (currentFocus < 0) currentFocus = items.length - 1;

    items[currentFocus].classList.add("autocomplete-active");

    // 🔥 AUTO SCROLL
    items[currentFocus].scrollIntoView({
      block: "nearest"
    });
  }

  function removeActive(items) {
    for (let item of items) {
      item.classList.remove("autocomplete-active");
    }
  }

  document.addEventListener("click", (e) => {
    if (e.target !== input) list.innerHTML = "";
  });
}

autocomplete(document.getElementById("pickup"));
autocomplete(document.getElementById("destination"));

// fare
function calculateFare() {
  const pickup = document.getElementById("pickup").value;
  const dest = document.getElementById("destination").value;
  const vehicle = document.getElementById("vehicle").value;

  if (!pickup || !dest) {
    alert("Please enter both locations!");
    return;
  }

  if (vehicle === "Noah" || vehicle === "HiAce") {
    document.getElementById("fare").innerText = "❌ Not Available";
    return;
  }

  const distance = 100;
  const fare = 500 + distance * 15;

  document.getElementById("fare").innerText =
    `🚗 Distance: ${distance} km | 💰 Fare: ${fare} BDT`;
}
</script>

</body>
</html>
